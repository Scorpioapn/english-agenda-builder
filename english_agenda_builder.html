<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>English Agenda Builder</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: light;
      --tm-maroon: #772432;
      --tm-blue: #004165;
      --tm-gray: #a9b2b1;
      --tm-yellow: #f2df74;
      --md-primary: var(--tm-maroon);
      --md-on-primary: #ffffff;
      --md-primary-container: #f8d8dd;
      --md-on-primary-container: #2d070f;
      --md-secondary: var(--tm-blue);
      --md-on-secondary: #ffffff;
      --md-secondary-container: #d6ecf8;
      --md-on-secondary-container: #001f31;
      --md-tertiary: #6b5d00;
      --md-tertiary-container: var(--tm-yellow);
      --md-on-tertiary-container: #211b00;
      --md-surface: #fffbff;
      --md-surface-container-low: #f9f7f5;
      --md-surface-container: #f0f1ef;
      --md-surface-container-high: #e7ebe9;
      --md-outline: #747d7c;
      --md-outline-variant: #c5ccca;
      --md-on-surface: #1a1c1c;
      --md-on-surface-variant: #444b4a;
      --md-error: #b3261e;
      --md-on-error: #ffffff;
      --ink: var(--md-on-surface);
      --muted: var(--md-on-surface-variant);
      --subtle: var(--md-surface-container);
      --panel: var(--md-surface);
      --line: var(--md-outline-variant);
      --maroon: var(--tm-maroon);
      --maroon-dark: #5a1724;
      --teal: var(--tm-blue);
      --amber: #9c6400;
      --blue: var(--tm-blue);
      --green: #1d7d48;
      --danger: var(--md-error);
      --shadow: 0 3px 8px rgba(0, 0, 0, 0.12), 0 1px 3px rgba(0, 0, 0, 0.12);
      --shadow-strong: 0 12px 30px rgba(0, 65, 101, 0.18);
      --radius: 8px;
      --page-width: 210mm;
      --page-height: 297mm;
      --ref-side-col: 68mm;
      --ref-grid-gap: 3mm;
      font-family: "Gotham", "Montserrat", "Aptos", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body,
    .print-page,
    .print-page * {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(119, 36, 50, 0.08), transparent 32%),
        linear-gradient(180deg, #fffbff 0%, #edf2f1 100%);
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      display: grid;
      grid-template-columns: minmax(360px, 440px) minmax(0, 1fr);
      gap: 14px;
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
      padding: 10px 12px;
    }

    .control-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      height: calc(100vh - 20px);
      min-height: 0;
      overflow: hidden;
    }

    .app-header,
    .editor-stack,
    .preview-panel {
      background: rgba(255, 251, 255, 0.96);
      border: 1px solid rgba(197, 204, 202, 0.92);
      box-shadow: var(--shadow);
    }

    .app-header {
      border-radius: var(--radius);
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .brand-row {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }

    .brand-mark {
      width: 96px;
      height: 58px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #fff;
      border: 1px solid var(--md-outline-variant);
      box-shadow: inset 0 -3px 0 rgba(119, 36, 50, 0.16);
      padding: 8px;
    }

    .brand-mark img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-family: "Gotham", "Aptos Display", "Segoe UI", Arial, sans-serif;
      font-size: 23px;
      line-height: 1.12;
      letter-spacing: 0;
      color: var(--tm-blue);
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.45;
    }

    strong {
      font-weight: 850;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .save-status,
    .agenda-count {
      font-size: 12px;
      color: var(--muted);
    }

    .top-actions,
    .action-row,
    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .btn {
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--md-secondary-container);
      color: var(--md-on-secondary-container);
      font-weight: 800;
      font-size: 13px;
      line-height: 1;
      min-height: 36px;
      transition: transform 0.12s ease, background 0.12s ease, color 0.12s ease, box-shadow 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: #c7e2f1;
      box-shadow: var(--shadow);
    }

    .btn:focus-visible,
    .input:focus-visible,
    .textarea:focus-visible,
    .select:focus-visible {
      outline: 3px solid rgba(242, 223, 116, 0.85);
      outline-offset: 2px;
    }

    .btn.primary {
      background: var(--md-primary);
      color: var(--md-on-primary);
    }

    .btn.primary:hover {
      background: var(--maroon-dark);
    }

    .btn.ghost {
      background: transparent;
      color: var(--md-primary);
      border: 1px solid var(--md-outline);
    }

    .btn.danger {
      color: var(--md-on-error);
      background: var(--md-error);
    }

    .btn.small {
      padding: 7px 10px;
      font-size: 12px;
      min-height: 30px;
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.42;
      transform: none;
      box-shadow: none;
    }

    .editor-stack {
      border-radius: var(--radius);
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    details.editor-section {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--md-surface);
      overflow: hidden;
    }

    details.editor-section[open] {
      box-shadow: var(--shadow);
    }

    details.editor-section summary {
      list-style: none;
      cursor: pointer;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 800;
      font-size: 15px;
      line-height: 1.25;
      color: var(--ink);
      background: var(--md-surface-container-low);
    }

    details.editor-section summary::-webkit-details-marker {
      display: none;
    }

    details.editor-section summary::after {
      content: "+";
      color: var(--maroon);
      font-weight: 900;
    }

    details.editor-section[open] summary::after {
      content: "-";
    }

    .section-body {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 10px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .qr-upload-field {
      grid-column: 1 / -1;
      border: 1px solid var(--md-outline-variant);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      justify-items: start;
    }

    .qr-upload-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qr-thumb-button {
      display: grid;
      place-items: center;
      width: 70px;
      height: 70px;
      padding: 0;
      border: 1px solid var(--md-outline-variant);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .qr-thumb-button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .qr-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    label {
      color: #374342;
      font-size: 12.5px;
      font-weight: 850;
      line-height: 1.25;
    }

    .input,
    .textarea,
    .select {
      width: 100%;
      border: 1px solid var(--md-outline);
      border-radius: 7px;
      background: var(--md-surface);
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
      min-width: 0;
      font-size: 14.5px;
      line-height: 1.35;
    }

    .input,
    .select {
      min-height: 42px;
    }

    .textarea {
      resize: none;
      min-height: 94px;
      line-height: 1.5;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    #meetingFields .field-readable {
      grid-column: 1 / -1;
    }

    #agendaForm .textarea {
      min-height: 116px;
    }

    .input:focus,
    .textarea:focus,
    .select:focus {
      border-color: var(--maroon);
      box-shadow: 0 0 0 3px rgba(119, 36, 50, 0.14);
    }

    .agenda-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .agenda-list {
      display: grid;
      gap: 10px;
      padding-right: 2px;
    }

    .agenda-card {
      border: 1px solid var(--md-outline-variant);
      border-radius: 8px;
      background: var(--md-surface);
      padding: 12px;
      display: grid;
      gap: 9px;
      cursor: grab;
      transition: border-color 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, opacity 0.12s ease, transform 0.12s ease;
    }

    .agenda-card.section-card {
      background: var(--md-primary-container);
      border-color: rgba(119, 36, 50, 0.28);
    }

    .agenda-card.active {
      border-color: var(--maroon);
      box-shadow: 0 0 0 3px rgba(119, 36, 50, 0.14);
    }

    .agenda-card.dragging {
      opacity: 0.46;
      cursor: grabbing;
    }

    .agenda-card.drop-before {
      box-shadow: inset 0 4px 0 var(--tm-maroon);
    }

    .agenda-card.drop-after {
      box-shadow: inset 0 -4px 0 var(--tm-maroon);
    }

    .agenda-main {
      display: grid;
      grid-template-columns: 18px 52px minmax(0, 1fr);
      gap: 11px;
      align-items: start;
    }

    .drag-handle {
      width: 18px;
      min-height: 28px;
      display: grid;
      place-items: center;
      color: var(--md-outline);
      touch-action: none;
    }

    .drag-handle::before {
      content: "";
      width: 4px;
      height: 22px;
      background:
        radial-gradient(circle, currentColor 1.6px, transparent 1.8px) 0 0 / 4px 7px;
    }

    .agenda-card:hover .drag-handle,
    .agenda-card.active .drag-handle {
      color: var(--tm-maroon);
    }

    .agenda-time {
      color: var(--maroon);
      font-weight: 900;
      font-size: 12.5px;
      line-height: 1.25;
      padding-top: 1px;
    }

    .agenda-title {
      font-weight: 850;
      font-size: 15px;
      line-height: 1.3;
      min-width: 0;
    }

    .agenda-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 4px;
    }

    .agenda-detail {
      color: var(--md-on-surface-variant);
      font-size: 12px;
      line-height: 1.55;
      margin-top: 6px;
      padding-left: 9px;
      border-left: 3px solid rgba(119, 36, 50, 0.18);
    }

    .agenda-form {
      border: 1px solid var(--line);
      background: var(--md-surface-container-low);
      border-radius: var(--radius);
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .preview-panel {
      border-radius: var(--radius);
      min-width: 0;
      height: calc(100vh - 20px);
      min-height: 0;
      overflow: hidden;
      padding: 30px 10px 8px;
      position: relative;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      align-content: start;
      justify-items: center;
    }

    .preview-toolbar {
      position: absolute;
      top: 9px;
      left: 14px;
      right: 14px;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      padding: 0;
    }

    .preview-stage {
      width: 100%;
      min-width: 0;
      min-height: 0;
      height: 100%;
      display: grid;
      align-items: start;
      align-content: start;
      justify-items: center;
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      padding: 0 0 18px;
    }

    .preview-sheet {
      --preview-scale: 1;
      position: relative;
      width: var(--page-width);
      height: var(--page-height);
      min-width: 0;
      overflow: hidden;
    }

    .preview-sheet .print-page {
      transform: scale(var(--preview-scale));
      transform-origin: top left;
    }

    .print-page {
      width: var(--page-width);
      height: var(--page-height);
      min-height: 0;
      overflow: hidden;
      background: var(--md-surface);
      color: var(--md-on-surface);
      box-shadow: var(--shadow-strong);
      padding: 12mm 12mm 10mm;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 4.5mm;
    }

    .page-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 146px;
      gap: 18px;
      align-items: start;
      border-bottom: 4px solid var(--tm-blue);
      padding-bottom: 5mm;
    }

    .club-kicker {
      color: var(--maroon);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0;
    }

    .page-title {
      font-family: "Gotham", "Aptos Display", "Segoe UI", Arial, sans-serif;
      color: var(--tm-blue);
      font-size: 27px;
      line-height: 1.1;
      font-weight: 900;
      margin-top: 4px;
      letter-spacing: 0;
    }

    .page-subtitle {
      color: var(--md-on-surface-variant);
      font-size: 13px;
      margin-top: 6px;
      line-height: 1.34;
    }

    .page-brand-panel {
      display: grid;
      gap: 8px;
      align-self: stretch;
    }

    .page-logo {
      border: 1px solid var(--md-outline-variant);
      border-radius: 8px;
      background: #fff;
      padding: 7px;
      min-height: 58px;
      display: grid;
      place-items: center;
    }

    .page-logo img {
      max-width: 100%;
      max-height: 44px;
      object-fit: contain;
      display: block;
    }

    .page-badge {
      border: 2px solid var(--tm-maroon);
      border-radius: 8px;
      padding: 7px 9px;
      text-align: center;
      color: var(--maroon);
      font-weight: 900;
      display: grid;
      place-items: center;
      background: var(--md-primary-container);
    }

    .badge-number {
      font-size: 26px;
      line-height: 1;
    }

    .badge-label {
      font-size: 10.5px;
      color: var(--md-on-surface-variant);
      margin-top: 4px;
    }

    .info-strip {
      display: grid;
      grid-template-columns: 1fr 1fr 1.2fr;
      gap: 8px;
    }

    .info-box,
    .side-card,
    .footer-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--md-surface);
      overflow: hidden;
    }

    .info-box {
      padding: 10px 12px;
      display: grid;
      gap: 3px;
      min-height: 48px;
      border-top: 4px solid var(--tm-blue);
    }

    .info-box.theme-box {
      border-top-color: var(--tm-maroon);
      background: linear-gradient(180deg, #fff7f8 0%, var(--md-surface) 100%);
    }

    .info-box.word-box {
      border-top-color: var(--tm-yellow);
      background: linear-gradient(180deg, #fffbea 0%, var(--md-surface) 100%);
    }

    .info-box.team-box {
      border-top-color: var(--tm-blue);
      background: linear-gradient(180deg, #eff8fc 0%, var(--md-surface) 100%);
    }

    .info-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 850;
      letter-spacing: 0;
    }

    .info-value {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 9px;
      align-items: start;
    }

    .agenda-table {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .agenda-table table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 8.6px;
    }

    .agenda-table th {
      background: var(--tm-blue);
      color: var(--md-on-secondary);
      padding: 4px 5px;
      text-align: left;
      font-size: 8.6px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .agenda-table td {
      padding: 2.4px 4.5px;
      border-top: 1px solid #e1e7e5;
      vertical-align: top;
      line-height: 1.22;
      word-break: normal;
      overflow-wrap: anywhere;
    }

    .agenda-table tbody tr:not(.table-section):nth-child(odd) td {
      background: #fbf8f8;
    }

    .agenda-table tbody tr:not(.table-section):nth-child(even) td {
      background: #f6fafb;
    }

    .agenda-table .time-col {
      width: 50px;
      color: var(--maroon);
      font-weight: 900;
    }

    .agenda-table .duration-col {
      width: 50px;
      text-align: center;
      color: var(--md-on-surface-variant);
      font-weight: 800;
    }

    .agenda-table .speaker-col {
      width: 104px;
      color: var(--md-on-surface-variant);
      font-weight: 750;
    }

    .table-section td {
      background: var(--md-primary-container);
      color: var(--md-on-primary-container);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 9px;
      padding: 4px 6px;
    }

    .program-title {
      font-weight: 850;
    }

    .program-detail {
      margin-top: 3px;
      color: var(--md-on-surface-variant);
      font-size: 8px;
      line-height: 1.22;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .side-stack {
      display: grid;
      gap: 10px;
    }

    .side-card h3,
    .footer-card h3 {
      background: var(--md-secondary-container);
      color: var(--md-on-secondary-container);
      font-size: 11px;
      padding: 6px 9px;
      text-transform: uppercase;
      letter-spacing: 0;
      font-weight: 900;
    }

    .side-card:nth-child(1) h3,
    .footer-card:nth-child(1) h3 {
      background: var(--tm-blue);
      color: #fff;
    }

    .side-card:nth-child(2) h3,
    .footer-card:nth-child(2) h3 {
      background: var(--tm-maroon);
      color: #fff;
    }

    .side-card:nth-child(3) h3,
    .footer-card:nth-child(3) h3 {
      background: var(--tm-yellow);
      color: #1f1b00;
    }

    .side-card:nth-child(4) h3 {
      background: var(--tm-gray);
      color: #102027;
    }

    .side-body,
    .footer-body {
      padding: 9px 10px;
      font-size: 9.3px;
      line-height: 1.3;
      color: var(--md-on-surface-variant);
      display: grid;
      gap: 5px;
    }

    .officer-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px 7px;
    }

    .officer-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
      border-bottom: 1px dashed var(--md-outline-variant);
      padding-bottom: 4px;
    }

    .officer-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .officer-role {
      color: var(--md-on-surface-variant);
      font-weight: 800;
    }

    .officer-name {
      text-align: left;
      font-weight: 850;
    }

    .timing-grid {
      display: grid;
      gap: 5px;
      border: 1px solid var(--md-outline-variant);
      border-radius: 7px;
      background: var(--md-surface-container-low);
      padding: 5px;
    }

    .timing-row {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr);
      gap: 5px;
      align-items: center;
    }

    .signal {
      border-radius: 999px;
      color: #fff;
      padding: 2px 6px;
      text-align: center;
      font-size: 8.8px;
      font-weight: 850;
    }

    .signal.green {
      background: var(--green);
    }

    .signal.yellow {
      background: var(--amber);
    }

    .signal.red {
      background: var(--danger);
    }

    .timing-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 8.7px;
      line-height: 1.18;
      overflow: hidden;

      color: #fff;
      border-radius: 8px;

      font-weight: 750;

      transform: translateX(-50%) translateY(0);

      display: none;
    }

    @page {

      margin: 0;

    @media print {

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function loadData() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return clone(DEFAULT_DATA);
        const parsed = JSON.parse(saved);
        return normalizeData({ ...clone(DEFAULT_DATA), ...parsed });
      } catch (error) {
        return clone(DEFAULT_DATA);
      }
    }

    function normalizeData(data) {
      const normalized = { ...clone(DEFAULT_DATA), ...data };
      for (const key of [
        "localAddress",
        "joinUs",
        "meetingVision",
        "nextTheme",
        "nextMeetingTime",
        "nextVenue",
        "guestParticipation",
        "liveVotingTitle",
        "liveVotingNote",
        "officialQrSrc",
        "membershipQrSrc",
        "votingQrSrc",
        "roleAssignments"
      ]) {
        if (!String(normalized[key] || "").trim()) {
          normalized[key] = DEFAULT_DATA[key];
        }
      }
      if (String(normalized.roleAssignments || "").includes("Photographer | Bandari")) {
        normalized.roleAssignments = DEFAULT_DATA.roleAssignments;
      }
      if (String(normalized.officers || "").includes("Vice President Education")) {
        normalized.officers = DEFAULT_DATA.officers;
      }
      if (String(normalized.aboutClub || "").includes("one of Shenzhen's most active")) {
        normalized.aboutClub = DEFAULT_DATA.aboutClub;
      }
      if (/[\u4e00-\u9fff]/.test(String(normalized.localAddress || ""))) {
        normalized.localAddress = DEFAULT_DATA.localAddress;
      }
      if (isLegacyTimingRules(normalized.timingRules)) {
        normalized.timingRules = DEFAULT_DATA.timingRules;
      }
      normalized.items = Array.isArray(data.items) ? data.items.map(normalizeItem) : clone(DEFAULT_DATA.items);
      return normalized;
    }

    function isLegacyTimingRules(value) {
      const text = String(value || "");
      return !text.trim()
        || (text.includes("Less than or equal to 2 minutes") && text.includes("Bell:"))
        || (text.includes("Less than or equal to 3 minutes") && text.includes("Bell:"))
        || (text.includes("Less/equal 2 min") && !text.includes("timer will ring the bell"))
        || (text.includes("Less/equal 2min") && !text.includes("timer will ring the bell"));
    }

    function normalizeItem(item) {
      return {
        id: item.id || newId(),
        kind: item.kind === "section" ? "section" : "item",
        time: item.time || "",
        title: item.title || "",
        duration: item.duration || "",
        person: item.person || "",
        detail: item.detail || ""
      };

        .replaceAll(">", "&gt;")

    function splitLines(value) {
      return String(value || "")
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);
    }

    function minutesFromDuration(value) {
      const text = String(value || "").trim();
      if (!text) return 0;
      const range = text.match(/(\d+(?:\.\d+)?)\s*-\s*(\d+(?:\.\d+)?)/);
      if (range) return Number(range[2]);
      const single = text.match(/(\d+(?:\.\d+)?)/);
      return single ? Number(single[1]) : 0;
    }

    function timeToMinutes(value) {
      const match = String(value || "").match(/^(\d{1,2}):(\d{2})/);
      if (!match) return 0;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function minutesToTime(total) {
      const normalized = ((Math.round(total) % 1440) + 1440) % 1440;
      const h = String(Math.floor(normalized / 60)).padStart(2, "0");
      const m = String(normalized % 60).padStart(2, "0");
      return `${h}:${m}`;
    }

    function formatDisplayDate() {
      if (!state.date) return "";
      const parts = state.date.split("-");
      if (parts.length !== 3) return state.date;
      return `${parts[1]}/${parts[2]}/${parts[0]}`;
    }

          return `
            <div class="${fieldClass}">
              <label for="field-${key}">${label}</label>

    function syncPreviewScale() {
      if (!els.previewSheet || !els.printPage) return;
      const pageWidth = els.printPage.offsetWidth || 794;
      const pageHeight = els.printPage.offsetHeight || 1123;
      const availableWidth = Math.max(280, (els.previewStage?.clientWidth || pageWidth) - 24);
      const scale = Math.min(1, availableWidth / pageWidth);
      els.previewSheet.style.setProperty("--preview-scale", scale.toFixed(4));
      els.previewSheet.style.width = `${Math.ceil(pageWidth * scale)}px`;
      els.previewSheet.style.height = `${Math.ceil(pageHeight * scale)}px`;
      els.previewMeta.dataset.fit = els.printPage.scrollHeight <= els.printPage.clientHeight + 1 ? "ok" : "overflow";
    }

    function buildAgendaGroups() {
      const groups = [];
      let current = { title: "Arrival", items: [] };
      for (const item of state.items) {
        if (item.kind === "section") {
          if (current.items.length) groups.push(current);
          current = { title: item.title || "Session", items: [] };
        } else {
          current.items.push(item);
        }
      }
      if (current.items.length) groups.push(current);
      return groups;
    }

    function stageMeta(title, index) {
      const normalized = String(title || "").toLowerCase();
      if (normalized.includes("prepared")) return { label: "Prepared Speeches", icon: "speech" };
      if (normalized.includes("table")) return { label: "Table Topics", icon: "megaphone" };
      if (normalized.includes("evaluation")) return { label: "Guests & Feedback", icon: "users" };
      if (normalized.includes("award") || normalized.includes("closing")) return { label: "Sharing", icon: "trophy" };
      if (normalized.includes("opening")) return { label: index === 0 ? "Arrival & Opening" : "Opening", icon: "group" };
      return { label: title || "Session", icon: "pin" };
    }

    function highlightClass(title) {
      const text = String(title || "").toLowerCase();
      if (text.includes("guest intro") || text.includes("vote")) return "ref-highlight-green";
      if (text.includes("photo") || text.includes("tea break")) return "ref-highlight-blue";
      return "";
    }

    function formatLongDate() {
      if (!state.date) return `${state.weekday || ""}`.trim();
      const date = new Date(`${state.date}T00:00:00`);
      if (Number.isNaN(date.getTime())) return `${state.date}, ${state.weekday || ""}`.trim();
      const month = date.toLocaleString("en-US", { month: "long" });
      return `${month} ${date.getDate()}, ${date.getFullYear()}, ${state.weekday || ""}`.trim().replace(/,\s*$/, "");
    }

    function aboutUsHtml() {
      const lines = splitLines(state.aboutClub);
      const intro = lines.slice(0, 2).join(" ");
      const venue = state.location || state.localAddress;
      return `
        <p class="ref-about-line">${escapeHtml(intro)}</p>
        <div class="ref-icon-line">${refIcon("eye", "ref-line-icon")}<span><strong>Vision:</strong> ${escapeHtml(state.meetingVision.replace(/^Meeting Vision:\s*/i, ""))}</span></div>
        <div class="ref-icon-line">${refIcon("clock", "ref-line-icon")}<span><strong>Meeting Time:</strong> ${escapeHtml(state.weekday)}, ${escapeHtml(state.meetingTime)}</span></div>
        <div class="ref-icon-line">${refIcon("pin", "ref-line-icon")}<span><strong>Venue:</strong> ${escapeHtml(venue)}</span></div>
      `;
    }

    function timingSignalCardsHtml(value) {
      return splitLines(value).map((line) => {
        const parts = line.split("|").map((part) => part.trim());
        const title = parts.shift() || "";
        const text = (...names) => {
          const part = parts.find((entry) => names.some((name) => entry.toLowerCase().startsWith(name)));
          return part && part.includes(":") ? part.split(":").slice(1).join(":").trim() : "";
        };
        const speechLength = text("speech length", "speech");
        const bellText = text("bell");
        return `
          <div class="ref-timing-card">
            <h4>${escapeHtml(shortTimingTitle(title))}</h4>
            ${speechLength ? `<p class="ref-timing-scope">${escapeHtml(speechLength)}</p>` : ""}
            <div class="ref-signal-grid">
              <div class="ref-signal-row"><span class="ref-signal-mark"><i class="ref-signal-dot green"></i>Green Card</span><span>${escapeHtml(shortSignalText(text("green")))}</span></div>
              <div class="ref-signal-row"><span class="ref-signal-mark"><i class="ref-signal-dot yellow"></i>Yellow Card</span><span>${escapeHtml(shortSignalText(text("yellow")))}</span></div>
              <div class="ref-signal-row ref-signal-red"><span class="ref-signal-mark"><i class="ref-signal-dot red"></i>Red Card</span><span>${escapeHtml(shortSignalText(text("red") || "TIME IS UP"))}</span></div>
              ${bellText ? `<div class="ref-signal-row ref-signal-bell"><span class="ref-signal-mark">Bell</span><span>${escapeHtml(shortSignalText(bellText))}</span></div>` : ""}
            </div>
          </div>
        `;
      }).join("");
    }

    function shortTimingTitle(title) {
      return String(title || "")
        .replace(/minutes?/gi, "min")
        .replace(/\s+/g, " ")
        .trim();
    }

    function shortSignalText(value) {
      return String(value || "")
        .replace(/time is up/gi, "TIME IS UP")
        .replace(/\s+/g, " ")
        .trim();
    }

    function qrCardHtml(src, label) {
      return `
        <div class="ref-qr-box">
          <img src="${escapeHtml(src)}" alt="${escapeHtml(label)} QR" />
          <span>${escapeHtml(label)}</span>
        </div>
      `;
    }

    function kvRowsHtml(value) {
      const rows = splitLines(value);
      return `<div class="ref-kv-list">${rows.map((line) => {
        const parts = line.split("|").map((part) => part.trim());
        const isWide = (parts[0] || "").toLowerCase() === "term";

          return `<div class="ref-kv-row ref-kv-wide"><span class="ref-kv-key">${escapeHtml(parts[0] || "")}:</span><span class="ref-kv-value">${escapeHtml(parts[1] || "")}</span></div>`;

        return `<div class="ref-kv-row"><span class="ref-kv-key">${escapeHtml(parts[0] || "")}</span><span class="ref-kv-value">${escapeHtml(parts[1] || "")}</span></div>`;
      }).join("")}</div>`;

    }

    function clubSummaryText(value) {
      const lines = splitLines(value);
      const cbdLine = lines.find((line) => line.includes("CBD stands for")) || "CBD: Confident, Brilliant, Dynamic.";
      const meetingLine = lines.find((line) => line.includes("Friday")) || "Offline weekly on Friday evenings.";
      return `${meetingLine} ${cbdLine}`;
    }

    function timingRulesHtml(value) {
      const rows = splitLines(value).map((line) => {
        const parts = line.split("|").map((part) => part.trim());
        const title = parts.shift() || "";
        const getSignal = (name) => {
          const part = parts.find((entry) => entry.toLowerCase().startsWith(name));
          return part && part.includes(":") ? part.split(":").slice(1).join(":").trim() : "";
        };
        return `
          <tr>
            <td class="rule-name">${escapeHtml(title)}</td>
            <td>${escapeHtml(getSignal("green"))}</td>
            <td>${escapeHtml(getSignal("yellow"))}</td>
            <td>${escapeHtml(getSignal("red"))}</td>
            <td>${escapeHtml(getSignal("bell"))}</td>
          </tr>
        `;
      }).join("");
      return `
        <table class="timing-table">
          <thead>
            <tr>
              <th>Rule</th>
              <th>Green</th>
              <th>Yellow</th>
              <th>Red</th>
              <th>Bell</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function officersHtml(value) {
      return splitLines(value).map((line) => {
        const parts = line.split("|").map((part) => part.trim());
        return `
          <div class="officer-row">
            <span class="officer-role">${escapeHtml(parts[0] || "")}</span>
            <span class="officer-name">${escapeHtml(parts[1] || "")}</span>
          </div>
        `;
      }).join("");
    }

    function keyValueListHtml(value) {
      const rows = splitLines(value).map((line) => {
        const parts = line.split("|").map((part) => part.trim());
        return `
          <li>
            <span class="compact-label">${escapeHtml(parts[0] || "")}</span>
            <span>${escapeHtml(parts[1] || "")}</span>
          </li>
        `;
      }).join("");
      return `<ul class="compact-list">${rows}</ul>`;
    }

    function renderAll() {
      renderInputs();
      renderAgendaList();
      renderPreview();
      syncFormVisibility();
      autoSizeTextareas();
    }

    function syncFromInputs(event) {
      const target = event.target;
      autoSizeTextarea(target);
      if (target.dataset.meetingField) {
        state[target.dataset.meetingField] = target.value;
      }
      if (target.dataset.field) {
        state[target.dataset.field] = target.value;
      }
      saveData();
      renderPreview();
    }

    function openForm(id) {
      const item = state.items.find((entry) => entry.id === id);
      if (!item) return;
      editingId = item.id;
      els.itemKind.value = item.kind;
      els.itemTime.value = item.time || "";
      els.itemTitle.value = item.title || "";
      els.itemDuration.value = item.duration || "";
      els.itemPerson.value = item.person || "";
      els.itemDetail.value = item.detail || "";
      syncFormVisibility();
      autoSizeTextarea(els.itemDetail);
      renderAgendaList();
    }

    function clearForm(kind = "item") {
      editingId = null;
      els.itemKind.value = kind;
      els.itemTime.value = "";
      els.itemTitle.value = "";
      els.itemDuration.value = "";
      els.itemPerson.value = "";
      els.itemDetail.value = "";
      syncFormVisibility();
      autoSizeTextarea(els.itemDetail);
      renderAgendaList();
    }

    function readForm() {
      return normalizeItem({
        id: editingId || newId(),
        kind: els.itemKind.value,
        time: els.itemTime.value,
        title: els.itemTitle.value.trim(),
        duration: els.itemDuration.value.trim(),
        person: els.itemPerson.value.trim(),
        detail: els.itemDetail.value.trim()
      });
    }

    function saveForm(event) {
      event.preventDefault();
      const item = readForm();
      if (!item.title) {
        showToast("Program title is required");
        return;
      }
      const index = state.items.findIndex((entry) => entry.id === item.id);
      if (index >= 0) {
        state.items[index] = item;
      } else {
        state.items.push(item);
      }
      editingId = item.id;
      saveData();
      renderAgendaList();
      renderPreview();
      showToast("Agenda item saved");
    }

    function syncAgendaDraftFromForm() {
      if (!editingId) return;
      const index = state.items.findIndex((entry) => entry.id === editingId);
      if (index < 0) return;
      state.items[index] = readForm();
      saveData();
      renderAgendaList();
      renderPreview();
    }

    function deleteCurrentItem() {
      if (!editingId) {
        showToast("No item selected");
        return;
      }
      const item = state.items.find((entry) => entry.id === editingId);
      if (!item) return;
      const confirmed = window.confirm(`Delete "${item.title || "Untitled"}"?`);
      if (!confirmed) return;
      state.items = state.items.filter((entry) => entry.id !== editingId);
      clearForm();
      saveData();
      renderAll();
      showToast("Item deleted");
    }

    function duplicateCurrentItem() {
      if (!editingId) {
        showToast("No item selected");
        return;
      }
      const source = state.items.find((entry) => entry.id === editingId);
      if (!source) return;
      const cloneItem = { ...clone(source), id: newId(), title: `${source.title} Copy` };
      const index = state.items.findIndex((entry) => entry.id === editingId);
      state.items.splice(index + 1, 0, cloneItem);
      saveData();
      openForm(cloneItem.id);
      renderPreview();
      showToast("Item duplicated");
    }

    function clearDropMarkers() {
      els.agendaList.querySelectorAll(".drop-before, .drop-after").forEach((card) => {
        card.classList.remove("drop-before", "drop-after");
      });
    }

    function reorderDraggedItem(targetId, insertAfter) {
      if (!draggedId || draggedId === targetId) return false;
      const fromIndex = state.items.findIndex((item) => item.id === draggedId);
      if (fromIndex < 0) return false;
      const [draggedItem] = state.items.splice(fromIndex, 1);
      let targetIndex = state.items.findIndex((item) => item.id === targetId);
      if (targetIndex < 0) {
        state.items.splice(fromIndex, 0, draggedItem);
        return false;
      }
      if (insertAfter) targetIndex += 1;
      state.items.splice(targetIndex, 0, draggedItem);
      saveData();
      renderAgendaList();
      renderPreview();
      return true;
    }

    function getDropPosition(event, card) {
      const rect = card.getBoundingClientRect();
      return event.clientY > rect.top + rect.height / 2;
    }

    function handleAgendaDragStart(event) {
      const card = event.target.closest(".agenda-card");
      if (!card || event.target.closest("button")) return;
      draggedId = card.dataset.id;
      card.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggedId);
    }

    function handleAgendaDragOver(event) {
      const card = event.target.closest(".agenda-card");
      if (!draggedId || !card || card.dataset.id === draggedId) return;
      event.preventDefault();
      const insertAfter = getDropPosition(event, card);
      clearDropMarkers();
      card.classList.add(insertAfter ? "drop-after" : "drop-before");
      event.dataTransfer.dropEffect = "move";
    }

    function handleAgendaDrop(event) {
      const card = event.target.closest(".agenda-card");
      if (!draggedId || !card) return;
      event.preventDefault();
      const moved = reorderDraggedItem(card.dataset.id, getDropPosition(event, card));
      clearDropMarkers();
      draggedId = null;
      if (moved) showToast("Agenda order updated");
    }

    function handleAgendaDragEnd() {
      els.agendaList.querySelectorAll(".dragging").forEach((card) => card.classList.remove("dragging"));
      clearDropMarkers();
      draggedId = null;
    }

    function rescheduleAgenda() {
      let cursor = timeToMinutes(state.agendaStartTime || "19:00");
      state.items = state.items.map((item) => {
        if (item.kind === "section") return item;
        const next = { ...item, time: minutesToTime(cursor) };
        cursor += minutesFromDuration(item.duration);
        return next;
      });
      saveData();
      renderAll();
      showToast("Agenda times recalculated");
    }

    function syncFormVisibility() {
      const isSection = els.itemKind.value === "section";
      els.itemTime.closest(".field").style.display = isSection ? "none" : "";
      els.itemDuration.closest(".field").style.display = isSection ? "none" : "";
      els.itemPerson.closest(".field").style.display = isSection ? "none" : "";
      els.itemDetail.closest(".field").style.display = isSection ? "none" : "";
    }

    function copyText() {
      const lines = [
        state.clubName,
        state.meetingTitle,
        `${state.weekday}, ${formatDisplayDate()} | ${state.meetingTime}`,
        `Theme: ${state.theme}`,
        `Word of the Day: ${state.wordOfDay}`,
        `Location: ${state.location}`,
        `Local Address: ${state.localAddress}`,
        `Meeting Manager: ${state.meetingManager}`,
        `Toastmaster: ${state.toastmaster}`,
        "",
        "Agenda"
      ];
      for (const item of state.items) {
        if (item.kind === "section") {
          lines.push("", item.title);
        } else {
          const meta = [item.time, item.title, item.duration ? `${item.duration} min` : "", item.person].filter(Boolean).join(" | ");
          lines.push(meta);
          if (item.detail) lines.push(`  ${item.detail}`);
        }
      }
      navigator.clipboard.writeText(lines.join("\n")).then(() => {
        showToast("Text copied");
      }).catch(() => {
        showToast("Copy failed");
      });
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `cbd-agenda-${state.meetingNumber || "draft"}.json`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("JSON exported");
    }

    async function importJson(file) {
      if (!file) return;
      try {
        const text = await file.text();
        state = normalizeData(JSON.parse(text));
        editingId = null;
        saveData();
        renderAll();
        showToast("JSON imported");
      } catch (error) {
        showToast("Import failed");
      } finally {
        els.importFile.value = "";
      }
    }

    function handleQrUploadClick(event) {
      const button = event.target.closest("[data-qr-upload]");
      if (!button) return;
      const fileInput = document.querySelector(`[data-qr-file="${CSS.escape(button.dataset.qrUpload)}"]`);
      fileInput?.click();
    }

    async function handleQrUploadChange(event) {
      const input = event.target.closest("[data-qr-file]");
      if (!input) return;
      const key = input.dataset.qrFile;
      const file = input.files?.[0];
      if (!file) return;
      try {
        state[key] = await readFileAsDataUrl(file);
        saveData();
        renderAll();
        showToast("QR image uploaded");
      } catch (error) {
        showToast("QR upload failed");
      } finally {
        input.value = "";
      }
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.addEventListener("load", () => resolve(reader.result));
        reader.addEventListener("error", () => reject(reader.error));
        reader.readAsDataURL(file);
      });
    }

    function resetDefaults() {
      const confirmed = window.confirm("Reset the local draft to the CBD #441 defaults?");
      if (!confirmed) return;
      state = clone(DEFAULT_DATA);
      editingId = null;
      saveData();
      renderAll();
      showToast("Defaults restored");
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => els.toast.classList.remove("show"), 1700);
    }

    function bindEvents() {
      document.addEventListener("input", syncFromInputs);
      els.agendaForm.addEventListener("submit", saveForm);
      els.agendaForm.addEventListener("input", syncAgendaDraftFromForm);
      els.itemKind.addEventListener("change", () => {
        syncFormVisibility();
        syncAgendaDraftFromForm();
      });
      els.addItemBtn.addEventListener("click", () => clearForm("item"));
      els.addSectionBtn.addEventListener("click", () => clearForm("section"));
      els.clearFormBtn.addEventListener("click", () => clearForm());
      els.deleteItemBtn.addEventListener("click", deleteCurrentItem);
      els.duplicateItemBtn.addEventListener("click", duplicateCurrentItem);
      els.rescheduleBtn.addEventListener("click", rescheduleAgenda);
      els.printBtn.addEventListener("click", () => window.print());
      els.copyBtn.addEventListener("click", copyText);
      els.exportBtn.addEventListener("click", exportJson);
      els.importBtn.addEventListener("click", () => els.importFile.click());
      els.importFile.addEventListener("change", (event) => importJson(event.target.files[0]));
      els.resetBtn.addEventListener("click", resetDefaults);
      document.addEventListener("click", handleQrUploadClick);
      document.addEventListener("change", handleQrUploadChange);
      els.agendaList.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const { action, id } = button.dataset;
        if (action === "edit") openForm(id);
      });
      els.agendaList.addEventListener("dragstart", handleAgendaDragStart);
      els.agendaList.addEventListener("dragover", handleAgendaDragOver);
      els.agendaList.addEventListener("dragleave", (event) => {
        if (!els.agendaList.contains(event.relatedTarget)) clearDropMarkers();
      });
      els.agendaList.addEventListener("drop", handleAgendaDrop);
      els.agendaList.addEventListener("dragend", handleAgendaDragEnd);
      window.addEventListener("resize", syncPreviewScale);
    }

    setupElements();
    renderAll();
    bindEvents();
  </script>
</body>
</html>
